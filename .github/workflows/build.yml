name: Build Mica

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

      - name: Apply patches
        run: ./gradlew applyPatches

      - name: Build server jar
        run: ./gradlew createMojmapBundlerJar

      - name: Get version info
        id: version
        run: |
          MC_VERSION=$(grep -oP 'mcVersion=\K.*' gradle.properties || echo "unknown")
          SHORT_SHA=${GITHUB_SHA::7}
          echo "mc_version=$MC_VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "filename=mica-${MC_VERSION}-${SHORT_SHA}.jar" >> $GITHUB_OUTPUT

      - name: Rename jar
        run: |
          JAR=$(find paper-server/build/libs -name "*-mojmap.jar" | head -1)
          cp "$JAR" "${{ steps.version.outputs.filename }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mica-server-${{ steps.version.outputs.short_sha }}
          path: ${{ steps.version.outputs.filename }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          MC_VERSION=$(grep -oP 'mcVersion=\K.*' gradle.properties || echo "unknown")
          SHORT_SHA=${GITHUB_SHA::7}
          DATE=$(date +'%Y-%m-%d')
          echo "mc_version=$MC_VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "tag=build-${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "filename=mica-${MC_VERSION}-${SHORT_SHA}.jar" >> $GITHUB_OUTPUT

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: mica-server-${{ steps.version.outputs.short_sha }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Mica Build ${{ steps.version.outputs.short_sha }} (MC ${{ steps.version.outputs.mc_version }})"
          body: |
            Automated build from commit ${{ github.sha }}

            **Minecraft Version:** ${{ steps.version.outputs.mc_version }}
            **Status:** Experimental — not for production use

            Download the jar below and run it like a Paper server.
          files: ${{ steps.version.outputs.filename }}
          prerelease: true
